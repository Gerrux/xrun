name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: xrun

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz

          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build release binary
        run: cargo build --release --package xrun-cli --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCHIVE="xrun-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          cp target/${{ matrix.target }}/release/xrun xrun
          tar czf "$ARCHIVE" xrun
          echo "ASSET=$ARCHIVE" >> $GITHUB_ENV

      - name: Rename binary (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          $ARCHIVE = "xrun-$env:GITHUB_REF_NAME-${{ matrix.target }}.zip"
          Copy-Item "target/${{ matrix.target }}/release/xrun.exe" "xrun.exe"
          Compress-Archive -Path "xrun.exe" -DestinationPath $ARCHIVE
          "ASSET=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python3 - <<'EOF'
          import re, os, sys
          version = os.environ.get("GITHUB_REF_NAME", "").lstrip("v")
          text = open("CHANGELOG.md").read()
          # Extract the section for this version
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL)
          body = m.group(1).strip() if m else f"Release {version}"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"body<<EOF\n{body}\nEOF\n")
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: xrun ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
