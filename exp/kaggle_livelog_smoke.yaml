name: livelog-smoke
vendor: kaggle

kaggle:
  kernel_slug: kartaviychert/xrun-livelog-smoke
  enable_gpu: false
  enable_internet: true

run:
  cmd: |
    python -c "
    import time
    import xrun_hook
    print('=== livelog smoke start ===', flush=True)
    for i in range(15):
        # No 'key=value' in stdout — the poller's parse_stdout_metrics regex
        # would otherwise inject phantom metrics from the print line.
        print(f'tick {i:02d}', flush=True)
        xrun_hook.metric('iter', float(i), step=i)
        if i % 5 == 4:
            xrun_hook.epoch(i // 5, {'iter_so_far': i})
        time.sleep(2)
    print('=== livelog smoke done ===', flush=True)
    xrun_hook.done()
    "
