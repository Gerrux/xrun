# Live-telemetry smoke on Kaggle.
# Run as-is — `{user}` is auto-resolved from your Kaggle credentials at
# launch time (works for both legacy username+key and access-token auth):
#   xrun launch exp/templates/kaggle_smoke.yaml --detach
#   xrun events <id>     # see stages mid-run
#   xrun metrics <id>    # 15 'iter' points + epoch payloads
# Requires `mlflow.url` configured (`xrun config set mlflow.url ...`).
name: livelog-smoke
vendor: kaggle

kaggle:
  kernel_slug: "{user}/xrun-livelog-smoke"
  enable_gpu: false
  enable_internet: true

run:
  cmd: |
    python -c "
    import time
    import xrun_hook
    print('=== livelog smoke start ===', flush=True)
    for i in range(15):
        # No 'key=value' in stdout — the poller's parse_stdout_metrics regex
        # would otherwise inject phantom metrics from the print line.
        print(f'tick {i:02d}', flush=True)
        xrun_hook.metric('iter', float(i), step=i)
        if i % 5 == 4:
            xrun_hook.epoch(i // 5, {'iter_so_far': i})
        time.sleep(2)
    print('=== livelog smoke done ===', flush=True)
    xrun_hook.done()
    "
